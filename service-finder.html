<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 프랑스어 학습 유형은? | 두우리</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    :root {
      --brick:       #C24A35;
      --brick-dark:  #A33B28;
      --brick-light: #F5E8E5;
      --dark:        #2E0E0C;
      --surface:     #FAF7F6;
      --border:      #EDE5E3;
      --muted:       #7A5550;
      --white:       #FFFFFF;
      --serif: 'Gowun Batang', Georgia, serif;
      --sans:  'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      background: var(--surface);
      color: var(--dark);
      min-height: 100vh;
    }

    /* ─────────── VIEW SHELL ─────────── */
    .view { display: none; min-height: 100vh; }
    .view.on { display: flex; flex-direction: column; align-items: center; }

    /* ═══════════════════════════════════
       LANDING
    ═══════════════════════════════════ */
    #v-land {
      justify-content: center;
      padding: 60px 24px 80px;
      text-align: center;
    }

    .land-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--brick-light);
      border: 1px solid rgba(194,74,53,.3);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      color: var(--brick);
      margin-bottom: 28px;
    }

    .land-title {
      font-family: var(--serif);
      font-size: clamp(30px, 7vw, 46px);
      font-weight: 700;
      color: var(--dark);
      line-height: 1.35;
      margin-bottom: 14px;
    }
    .land-title em { color: var(--brick); font-style: normal; }

    .land-sub {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.9;
      max-width: 340px;
      margin: 0 auto 32px;
    }

    .land-stats {
      display: flex;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 36px;
    }
    .land-stat {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
    }

    .land-cta {
      display: inline-block;
      background: var(--brick);
      color: var(--white);
      border: none;
      border-radius: 14px;
      padding: 16px 44px;
      font-family: var(--sans);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(194,74,53,.35);
      transition: all .2s;
      text-decoration: none;
    }
    .land-cta:hover {
      background: var(--brick-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(194,74,53,.35);
    }

    .land-foot {
      margin-top: 52px;
      font-size: 12px;
      color: var(--border);
    }
    .land-foot strong { color: var(--muted); }

    /* ═══════════════════════════════════
       QUIZ
    ═══════════════════════════════════ */
    #v-quiz {
      justify-content: flex-start;
      background: var(--surface);
    }

    .qz-topbar {
      position: sticky;
      top: 0;
      width: 100%;
      background: var(--surface);
      padding: 16px 20px 12px;
      z-index: 50;
    }
    .qz-top-row {
      display: flex;
      justify-content: space-between;
      max-width: 580px;
      margin: 0 auto 8px;
    }
    .qz-step { font-size: 13px; font-weight: 600; color: var(--muted); }
    .qz-pct  { font-size: 13px; font-weight: 700; color: var(--brick); }
    .qz-bar  {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      max-width: 580px;
      margin: 0 auto;
    }
    .qz-bar-fill {
      height: 100%;
      background: var(--brick);
      border-radius: 2px;
      transition: width .4s cubic-bezier(.4,0,.2,1);
    }

    .qz-body {
      width: 100%;
      max-width: 580px;
      padding: 20px 20px 60px;
      margin: 0 auto;
    }

    .qz-card {
      background: var(--white);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(46,14,12,.08);
      animation: popUp .3s cubic-bezier(.22,.68,0,1.1) both;
    }
    @keyframes popUp {
      from { opacity: 0; transform: translateY(14px) scale(.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .qz-head { padding: 28px 24px 18px; }

    .qz-badge {
      display: inline-block;
      background: var(--brick-light);
      color: var(--brick);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 6px;
      margin-bottom: 14px;
    }

    .qz-q {
      font-family: var(--serif);
      font-size: 20px;
      font-weight: 700;
      color: var(--dark);
      line-height: 1.5;
    }
    .qz-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.6;
    }

    .qz-opts {
      padding: 4px 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .qz-opt {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      background: var(--white);
      text-align: left;
      width: 100%;
      transition: border-color .12s, background .12s;
    }
    .qz-opt:hover {
      border-color: var(--brick);
      background: var(--brick-light);
    }
    .qz-opt.sel {
      border-color: var(--brick);
      background: var(--brick-light);
    }

    .opt-ico {
      width: 38px; height: 38px; min-width: 38px;
      background: var(--surface);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    .qz-opt.sel .opt-ico { background: rgba(194,74,53,.14); }

    .opt-body { flex: 1; }
    .opt-main { font-size: 14px; font-weight: 600; color: var(--dark); line-height: 1.4; }
    .opt-hint { font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.4; }

    /* ═══════════════════════════════════
       RESULT
    ═══════════════════════════════════ */
    #v-result {
      justify-content: flex-start;
    }

    /* Hero */
    .res-hero {
      width: 100%;
      background: var(--dark);
      color: var(--white);
      padding: 52px 24px 44px;
      text-align: center;
    }
    .res-hero-label {
      font-size: 12px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: rgba(255,255,255,.5);
      font-weight: 600;
      margin-bottom: 18px;
    }
    .res-emoji { font-size: 60px; line-height: 1; margin-bottom: 14px; }
    .res-name {
      font-family: var(--serif);
      font-size: 32px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 10px;
    }
    .res-name u {
      text-decoration-color: var(--brick);
      text-underline-offset: 5px;
    }
    .res-quote {
      font-size: 14px;
      color: rgba(255,255,255,.65);
      font-style: italic;
      line-height: 1.7;
    }

    /* Body */
    .res-body {
      width: 100%;
      max-width: 580px;
      padding: 0 20px 80px;
      margin: 0 auto;
    }

    .res-card {
      background: var(--white);
      border-radius: 16px;
      padding: 24px;
      margin-top: 14px;
      box-shadow: 0 2px 14px rgba(46,14,12,.06);
    }

    .res-card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .res-card-title .ti { font-size: 18px; }

    .res-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.85;
    }

    /* Strengths grid */
    .sf-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .sf-box {
      background: var(--surface);
      border-radius: 10px;
      padding: 14px 12px;
    }
    .sf-box.str { border-top: 3px solid #4CAF50; }
    .sf-box.ctn { border-top: 3px solid #FF9800; }
    .sf-lbl {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .sf-box.str .sf-lbl { color: #388E3C; }
    .sf-box.ctn .sf-lbl { color: #E65100; }
    .sf-list { list-style: none; }
    .sf-list li {
      font-size: 12.5px;
      color: var(--dark);
      line-height: 1.65;
      padding-left: 10px;
      position: relative;
    }
    .sf-list li::before { content:'·'; position:absolute; left:0; }

    /* Tips */
    .tips { display: flex; flex-direction: column; gap: 14px; }
    .tip  { display: flex; gap: 12px; align-items: flex-start; }
    .tip-n {
      width: 24px; height: 24px; min-width: 24px;
      background: var(--brick);
      color: var(--white);
      border-radius: 50%;
      font-size: 11px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .tip-t { font-size: 14px; font-weight: 700; color: var(--dark); margin-bottom: 3px; }
    .tip-s { font-size: 12.5px; color: var(--muted); line-height: 1.6; }

    /* Warning */
    .warn-box {
      background: #FFFBF0;
      border: 1px solid #FFE082;
      border-radius: 10px;
      padding: 16px;
      font-size: 13.5px;
      color: #5D4037;
      line-height: 1.75;
    }

    /* Routine */
    .routine-list { display: flex; flex-direction: column; gap: 8px; }
    .routine-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: var(--surface);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      color: var(--dark);
      line-height: 1.6;
    }
    .routine-item .ri-label {
      font-weight: 700;
      color: var(--brick);
      min-width: 36px;
      font-size: 12px;
    }

    /* CTA block */
    .res-cta-block {
      background: var(--dark);
      border-radius: 16px;
      padding: 28px 24px;
      margin-top: 14px;
      text-align: center;
      color: var(--white);
    }
    .res-cta-tag {
      display: inline-block;
      background: var(--brick);
      color: var(--white);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 4px;
      margin-bottom: 14px;
    }
    .res-cta-title {
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 8px;
    }
    .res-cta-sub {
      font-size: 13px;
      color: rgba(255,255,255,.65);
      line-height: 1.75;
      margin-bottom: 20px;
    }
    .res-cta-btn {
      display: block;
      background: var(--brick);
      color: var(--white);
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: background .15s;
    }
    .res-cta-btn:hover { background: var(--brick-dark); }

    /* Share */
    .res-share {
      background: var(--white);
      border-radius: 16px;
      padding: 20px 24px;
      margin-top: 14px;
      box-shadow: 0 2px 14px rgba(46,14,12,.06);
    }
    .share-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--dark);
      text-align: center;
      margin-bottom: 12px;
    }
    .share-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .share-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      color: var(--dark);
      transition: all .15s;
    }
    .share-btn:hover { border-color: var(--brick); background: var(--brick-light); }
    .share-btn span:first-child { font-size: 22px; }

    .res-retry {
      display: block;
      width: 100%;
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 13px;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      margin-top: 10px;
      transition: all .15s;
    }
    .res-retry:hover { border-color: var(--muted); color: var(--dark); }

    /* ═══════════════════════════════════
       TOAST
    ═══════════════════════════════════ */
    #toast {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 308px;
      background: var(--white);
      border-radius: 14px;
      border: 1.5px solid var(--border);
      box-shadow: 0 8px 32px rgba(46,14,12,.14);
      z-index: 9999;
      overflow: hidden;
      animation: toastIn .42s cubic-bezier(.22,.68,0,1.2) both;
      cursor: pointer;
    }
    #toast.out { animation: toastOut .3s ease forwards; }
    #toast.gone { display: none; }

    @keyframes toastIn {
      from { opacity:0; transform: translateX(calc(100% + 24px)); }
      to   { opacity:1; transform: translateX(0); }
    }
    @keyframes toastOut {
      from { opacity:1; transform: translateX(0); }
      to   { opacity:0; transform: translateX(calc(100% + 24px)); }
    }

    .toast-top {
      padding: 14px 14px 10px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .toast-flag {
      width: 36px; height: 36px; min-width: 36px;
      background: var(--brick-light);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .toast-words { flex: 1; }
    .toast-tit { font-size: 13px; font-weight: 700; color: var(--dark); margin-bottom: 2px; }
    .toast-sub { font-size: 11px; color: var(--muted); line-height: 1.5; }
    .toast-x {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 14px; padding: 2px 0 0;
      flex-shrink: 0;
    }
    .toast-x:hover { color: var(--dark); }

    .toast-foot {
      padding: 0 14px 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .toast-go {
      flex: 1;
      background: var(--brick);
      color: var(--white);
      border: none;
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
    }
    .toast-go:hover { background: var(--brick-dark); }
    .toast-cd { font-size: 11px; color: var(--muted); white-space: nowrap; }

    .toast-bar { height: 3px; background: var(--border); }
    .toast-fill {
      height: 100%;
      background: var(--brick);
      width: 100%;
      transition: width linear;
    }

    @media (max-width: 480px) {
      #toast { top: 12px; right: 12px; left: 12px; width: auto; }
    }
  </style>
</head>
<body>

<header id="site-header" class="site-header"></header>
<div id="side-menu" class="side-menu"></div>
<div id="menu-overlay" class="menu-overlay" onclick="closeMenu()"></div>
<div id="kakao-float"></div>

<!-- ═══════════════ LANDING ═══════════════ -->
<div id="v-land" class="view on">
  <div style="text-align:center; max-width:400px; width:100%; padding:0 20px;">
    <h1 class="land-title">나의 프랑스어<br><em>학습 유형</em>은?</h1>
    <p class="land-sub">지금 어떻게 배울 때 제일 잘 됐나요?<br>잠깐 솔직해져볼게요.<br>8가지 질문으로 딱 맞는 방법 찾아드려요.</p>
    <div class="land-stats">
      <span class="land-stat">⏱ 약 2분</span>
      <span class="land-stat">📋 8문항</span>
      <span class="land-stat">🎯 6가지 유형</span>
    </div>
    <button class="land-cta" onclick="startQuiz()">테스트 시작하기 →</button>
    <p class="land-foot" style="margin-top:52px">🐼 Made by <strong>김두우리</strong> · 프랑스어 튜터</p>
  </div>
</div>

<!-- ═══════════════ QUIZ ═══════════════ -->
<div id="v-quiz" class="view">
  <div class="qz-topbar">
    <div class="qz-top-row">
      <span class="qz-step" id="qz-step">1 / 8</span>
      <span class="qz-pct"  id="qz-pct">0%</span>
    </div>
    <div class="qz-bar">
      <div class="qz-bar-fill" id="qz-fill" style="width:0%"></div>
    </div>
  </div>
  <div class="qz-body">
    <div class="qz-card" id="qz-card"><!-- JS renders here --></div>
  </div>
</div>

<!-- ═══════════════ RESULT ═══════════════ -->
<div id="v-result" class="view"><!-- JS renders here --></div>

<!-- ═══════════════ TOAST ═══════════════ -->
<div id="toast" style="display:none" onclick="handleToastClick(event)">
  <div class="toast-top">
    <div class="toast-flag">🇫🇷</div>
    <div class="toast-words">
      <p class="toast-tit">학습 유형 아직 모르세요?</p>
      <p class="toast-sub">8가지 질문으로 찾아드릴게요</p>
    </div>
    <button class="toast-x" onclick="dismissToast(event)">✕</button>
  </div>
  <div class="toast-foot">
    <button class="toast-go" onclick="startQuiz()">2분 테스트 →</button>
    <span class="toast-cd" id="t-cd">10초 후 닫힘</span>
  </div>
  <div class="toast-bar">
    <div class="toast-fill" id="t-fill"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════
   DATA — 8 QUESTIONS
═══════════════════════════════════════════ */
const QS = [
  {
    q: '지금 프랑스어, 어느 정도예요?',
    sub: '가장 솔직하게 느껴지는 것을 골라주세요.',
    opts: [
      { e:'🌱', l:'Bonjour도 낯설어요', h:'완전 처음 시작', sc:{youtube:2, self_paced:2, threads:1} },
      { e:'🌿', l:'발음·기초 인사말 정도는 알아요', h:'아직 초반', sc:{self_paced:2, threads:1, youtube:1} },
      { e:'🌳', l:'간단한 문장은 읽고 쓸 수 있어요', h:'A2 수준', sc:{self_paced:2, intensive:1, one_on_one:1} },
      { e:'🍀', l:'일상 대화는 어느 정도 돼요', h:'B1, 더 자연스럽게 다듬고 싶다', sc:{one_on_one:2, special:1, intensive:1} },
      { e:'🎬', l:'두우리 인강 수강 중이에요!', h:'이미 커리큘럼을 듣고 있어요', sc:{special:5, one_on_one:1} },
    ]
  },
  {
    q: '프랑스어랑 알고 지낸 지 얼마나 됐어요?',
    sub: '처음 접한 시점 기준이에요.',
    opts: [
      { e:'🥚', l:'아직 시작 전 (마음만 먹은 상태)', h:'', sc:{youtube:2, threads:2, self_paced:1} },
      { e:'🐣', l:'3개월 미만, 새내기', h:'', sc:{self_paced:1, youtube:1, threads:1} },
      { e:'🐥', l:'3~6개월차', h:'', sc:{self_paced:1, intensive:1} },
      { e:'🐦', l:'6개월~1년, 좀 익숙해짐', h:'', sc:{one_on_one:1, intensive:1} },
      { e:'🦅', l:'1년 이상, 꽤 됐어요', h:'', sc:{one_on_one:2, special:1} },
    ]
  },
  {
    q: '프랑스어, 왜 배우세요?',
    sub: '가장 솔직한 이유를 하나 골라주세요.',

function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  window.scrollTo({ top: 0, behavior: 'instant' });
}

═══════════════════════════════════════════ */
function startQuiz() {
  qIdx = 0;
  sc   = { one_on_one:0, special:0, intensive:0, self_paced:0, youtube:0, threads:0 };
  showView('v-quiz');
  renderQ();
  dismissToast();
}

function renderQ() {
  const q    = QS[qIdx];
  const pct  = Math.round((qIdx / QS.length) * 100);

  document.getElementById('qz-step').textContent = `${qIdx + 1} / ${QS.length}`;
  document.getElementById('qz-pct').textContent  = `${pct}%`;
  document.getElementById('qz-fill').style.width = `${pct}%`;

  const card = document.getElementById('qz-card');
  card.style.animation = 'none';
  void card.offsetHeight;
  card.style.animation = '';

  card.innerHTML = `
    <div class="qz-head">
      <span class="qz-badge">QUESTION ${qIdx + 1}</span>
      <p class="qz-q">${q.q}</p>
      ${q.sub ? `<p class="qz-sub">${q.sub}</p>` : ''}
    </div>
    <div class="qz-opts">
      ${q.opts.map((o, i) => `
        <button class="qz-opt" onclick="pick(${i})">
          <span class="opt-ico">${o.e}</span>
          <span class="opt-body">
            <span class="opt-main">${o.l}</span>
            ${o.h ? `<span class="opt-hint">${o.h}</span>` : ''}
          </span>
        </button>
      `).join('')}
    </div>
  `;
}

function pick(i) {
  // Highlight
  document.querySelectorAll('.qz-opt')[i].classList.add('sel');

  // Accumulate scores
  const chosen = QS[qIdx].opts[i];
  Object.entries(chosen.sc).forEach(([k, v]) => { sc[k] = (sc[k] || 0) + v; });

  // Advance
  setTimeout(() => {
    qIdx++;
    if (qIdx < QS.length) renderQ();
    else showResult();
  }, 280);
}

function doShare(type) {

      .then(() => alert('링크가 복사됐어요!'))
      .catch(() => alert(window.location.href));
  } else {

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
let _tInt = null;
let _tSec = 10;

window.addEventListener('load', () => {
  setTimeout(() => {
    const el = document.getElementById('toast');
    el.style.display = 'block';
    _startToast();
  }, 2500);
});

function _startToast() {
  _tSec = 10;
  const fill = document.getElementById('t-fill');
  const cd   = document.getElementById('t-cd');
  // Reset bar
  fill.style.transition = 'none';
  fill.style.width = '100%';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    fill.style.transition = `width ${_tSec}s linear`;
    fill.style.width = '0%';
  }));
  _tInt = setInterval(() => {
    _tSec--;
    cd.textContent = `${_tSec}초 후 닫힘`;
    if (_tSec <= 0) { clearInterval(_tInt); dismissToast(); }
  }, 1000);
}

function dismissToast(e) {
  if (e) e.stopPropagation();
  clearInterval(_tInt);
  const el = document.getElementById('toast');
  el.classList.add('out');
  el.addEventListener('animationend', () => el.classList.add('gone'), { once: true });
}

function handleToastClick(e) {
  if (e.target.classList.contains('toast-x')) return;
  dismissToast();
  startQuiz();
}
